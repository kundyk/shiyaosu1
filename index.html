<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Polyfill for esbuild __publicField helper
      window.__publicField = function(obj, key, value) {
        if (key in obj) {
          Object.defineProperty(obj, key, { enumerable: true, configurable: true, writable: true, value: value });
        } else {
          obj[key] = value;
        }
        return obj;
      };

      window.addEventListener('error', function(event) {
        console.error('Global error caught:', event);
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = 'red';
        errorDiv.style.color = 'white';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.padding = '20px';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerText = 'Global Error: ' + event.message + '\n' + (event.error ? event.error.stack : '');
        (document.body || document.documentElement).appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled rejection caught:', event);
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = 'orange';
        errorDiv.style.color = 'white';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.padding = '20px';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerText = 'Unhandled Rejection: ' + event.reason;
        (document.body || document.documentElement).appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
